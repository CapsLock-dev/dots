[colors]
background = #1a1b26
foreground = #c0caf5
primary = #F0C674
secondary = #8ABEB7
alert = #A54242
disabled = #707880
focused = #7aa2f7

[bar/mybar]
width = 100%
height = 24
background = ${colors.background}
foreground = ${colors.foreground}
border-top-size = 6
padding = 1
border-color = ${colors.background}
separator = " | "
separator-foreground = ${colors.foreground}
font-0 = Hack Nerd Font
font-1 = NotoEmoji:scale=8
font-2 = Noto Sans Yi 
font-3 = WenQuanYi Zen Hei
font-4 = Noto Sans Math
modules-left = i3 kernel xkeyboard
modules-center = time xwindow
modules-right = ram cpu audio
line-size = 0

[module/i3]
type = internal/i3
format = <label-state> <label-mode>
label-focused = %index%
label-mode = | %mode%
label-focused-foreground = ${colors.focused}
label-unfocused = %index%
label-unfocused-foreground = {colors.foreground}
label-urgent-foreground = ${colors.alert}
label-urgent-padding = 0
label-separator = " "

[module/xwindow]
type = internal/xwindow
format-prefix = "Ôčź "
format-prefix-foreground = ${colors.focused}
label-maxlen = 50
label-empty = "No window focused!"

[module/time]
type = internal/date
interval = 1
date = %a %d %b
time = %H:%M:%S
date-alt = %A %d %B %Y
time-alt = %H:%M:%S
format = <label>
format-prefix = "ÔôŹ "
format-prefix-foreground = ${colors.focused}
label = %date% %time%

[module/kernel]
type = custom/script
exec = uname -r | cut -d '-' -f1
format-prefix = "Óúí "
format-prefix-foreground = ${colors.focused}

[module/xkeyboard]
type = internal/xkeyboard
format = <label-layout>
label-layout =%layout%
label-layout-foreground = ${colors.focused}

[module/audio]
type = internal/pulseaudio
sink = alsa_output.pci-0000_12_00.3.analog-stereo
use-ui-max = true
interval = 5
format-volume = <ramp-volume> <label-volume>
label-muted = Ô™Ä Muted
label-muted-foreground = ${colors.alert}
format-prefix-foreground = ${colors.focused}
ramp-volume-0 = ÔÄß
ramp-volume-1 = Ô©Ĺ
ramp-volume-2 = ÔÄ® 
click-right = pavucontrol-qt
ramp-volume-foreground = ${colors.focused}

[module/cpu]
type = internal/cpu
interval = 2
format = <label>
format-prefix = Ô°ö CPU 
format-prefix-foreground = ${colors.focused}
label = " %percentage%%"

[module/ram]
type = internal/memory
interval = 3
format = <label> 
format-prefix = Ôčõ RAM
format-prefix-foreground = ${colors.focused}
label = " %percentage_used%%" 

[settings]
screenchange-reload = true
pseudo-transparency = true

